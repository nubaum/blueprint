<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            html,
            body,
            #container {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div id="container"></div>

        <script src="./vs/loader.js"></script>
        <script>
            require.config({ paths: { vs: "./vs" } });

            require(["vs/editor/editor.main"], function () {
                monaco.languages.register({ id: "blue" });

                monaco.languages.setLanguageConfiguration("blue", {
                    comments: {
                        lineComment: "//",
                        blockComment: ["/*", "*/"],
                    },
                    brackets: [
                        ["{", "}"],
                        ["(", ")"],
                        ["[", "]"],
                    ],
                    autoClosingPairs: [
                        { open: "{", close: "}" },
                        { open: "(", close: ")" },
                        { open: "[", close: "]" },
                        { open: '"', close: '"' },
                    ],
                });

                monaco.languages.setMonarchTokensProvider("blue", {
                    tokenizer: {
                        root: [
                            [/\bentity\b/, "keyword"],
                            [/\battribute\b/, "keyword"],
                            [/\bRules\b/, "keyword"],
                            [/\btext\b|\bnumber\b/, "type"],
                            [/[A-Z][A-Za-z0-9_]*/, "type.identifier"],
                            [/[a-z_][A-Za-z0-9_]*/, "identifier"],
                            [/\d+/, "number"],
                            [/[{}()\[\]]/, "@brackets"],
                            [/[.;]/, "delimiter"],
                            [/\/\/.*$/, "comment"],
                            [/\s+/, "white"],
                        ],
                    },
                });

                window.editor = monaco.editor.create(
                    document.getElementById("container"),
                    {
                        language: "blue",
                        value: `entity Person
{
    text attribute Name;
    number attribute Age;

    Rules
    {
        Name.MaxLength(200).MinLenght(5);
        Age.BeGreaterThan(18);
    }
}`,
                        minimap: { enabled: false },
                        automaticLayout: true,
                        theme: "vs-dark",
                        scrollbar: {
                            vertical: "visible",
                            horizontal: "visible",
                            useShadows: false,
                            verticalScrollbarSize: 10,
                            horizontalScrollbarSize: 10,
                            arrowSize: 0,
                        },
                        minimap: {
                            enabled: true,
                            side: "right", // 'right' (default) or 'left'
                            showSlider: "mouseover", // 'always' or 'mouseover' (VS Code default)
                            renderCharacters: true, // false = colored blocks instead of characters
                        },
                        readOnly: false,
                        mouseWheelZoom: true
                    },
                );
            });
        </script>
    </body>
</html>
