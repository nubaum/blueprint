<div class="editor">
  @if (!hasTabs()) {
    <div class="editor__empty">
      <h2>Blueprint</h2>
      <p>Click <strong>Home</strong> in the sidebar to open a file</p>
    </div>
  }

  <div
    #editorContainer
    class="editor__container"
    [class.editor__container--visible]="hasTabs()"
  ></div>
</div>
